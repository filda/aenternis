# cargo-mutants configuration for aenternis.
#
# Each entry in `exclude_re` is a regex matched against the mutant
# label, which has the form
#   `crates/<crate>/src/<file>:<line>:<col>: <transformation> in <function>`
# Exclusions document *equivalent* mutants — those whose mutated
# program produces output indistinguishable from the unmutated one
# under the constraints of the surrounding code, so no test could
# distinguish them. Exclusions document the *why*, not just suppress.
exclude_re = [
    # `r < frac` vs `r <= frac` in `stochastic_floor`. The two
    # comparisons differ only when `r == frac` exactly. Both `r` (from
    # `next_f64`) and `frac` (from `value - whole`) are arbitrary
    # 32-bit-derived f64 values; the probability of bit-exact equality
    # is below `2^-32` per draw, and any such tie shifts a *single*
    # rounded output by 1 — undetectable through the statistical
    # `stochastic_floor_expectation_matches_input` tolerance and
    # invisible to any deterministic snapshot.
    "rng\\.rs:.*replace < with <= in Rng::stochastic_floor",

    # The three `coord.x + off.x` (and y, z) offset additions in
    # `refresh_mass` flipped to `-`. Equivalent by stencil symmetry: the
    # gravity stencil contains an offset `(a,b,c)` iff it contains
    # `(-a,b,c)` (the cutoff `a²+b²+c² ≤ R²` and weight `1/|d|` depend only
    # on the squared components), so negating any single axis is a
    # weight-preserving bijection of the stencil. The mass sum
    # `Σ E(c+off)·w` is therefore *identical* whether each axis is added or
    # subtracted — no input can distinguish them. (Note this is the bare
    # `+`; the `acc += e*w` accumulation flipped to `-=` is a different,
    # non-equivalent mutant and is caught.)
    "tick\\.rs:.*replace \\+ with - in refresh_mass",

    # `next_f64() < p_flip` vs `<=` in `apply_density_coupled_mutation`.
    # Same measure-zero argument as `stochastic_floor` above: the two
    # comparisons differ only when `next_f64()` (a `k / 2^32` value)
    # equals `p_flip` bit-exactly. At the common clamped `p_flip == 1.0`
    # they are identical (`next_f64() < 1.0` is always true, as is
    # `<= 1.0`); at any fractional `p_flip` an exact tie has probability
    # below `2^-32` per slot and would shift a single slot's flip
    # decision by one — invisible to the conservation, determinism, and
    # popcount pins. Truly observation-equivalent.
    "tick\\.rs:.*replace < with <= in apply_density_coupled_mutation",

    # Two `> → >=` mutants in `compute_natural_rates`, both equivalent
    # for different but converging reasons:
    #
    #   `if my_energy > neighbor_energy { stochastic_floor(...) } else { 0 }`
    # — with `>=`, the equality case enters the first branch and
    # computes `stochastic_floor(0.0 * coeff)`, which short-circuits
    # to `0` without advancing the RNG (`value <= 0.0` early-return).
    # Same rate=0 *and* same RNG state.
    #
    #   `if cell.total_rate() > my_energy { proportional_clamp(...) }`
    # — with `>=`, the equality case calls
    # `proportional_clamp(rates, my_energy, ...)`, which delegates to
    # `apportion_with_shuffle` and hits its `if total <= cap64` fast
    # path. The fast path returns the input values cast back to `u32`
    # and the wrapper writes them to `rates` unchanged; no RNG draw
    # happens because the seed init is past the early return.
    #
    # Both are truly observation-equivalent.
    "tick\\.rs:.*replace > with >= in compute_natural_rates",

    # wasm32-only entry points in `aenternis-wasm/src/lib.rs`.
    # `cells_snapshot_view`, `cell_inspect_view`, and the
    # `__aenternis_wasm_start` panic-hook init are all gated to
    # `#[cfg(target_arch = "wasm32")]`. cargo-mutants runs against the
    # host target, where these functions are absent from compilation —
    # any mutation is unreachable by construction. The wasm32-only
    # surface is verified end-to-end by `tests/web/wasm-bundle.smoke
    # .test.ts` against the built `pkg/` bundle and by the manual
    # browser flow on the WASM viewer.
    "aenternis-wasm/src/lib\\.rs:.*replace __aenternis_wasm_start",
    "aenternis-wasm/src/lib\\.rs:.*replace World::cells_snapshot_view",
    "aenternis-wasm/src/lib\\.rs:.*replace World::cell_inspect_view",

    # `Vec::reserve(n)` arithmetic in the core snapshot/inspect payload
    # builders (`aenternis-core::snapshot`, shared by the WASM and
    # native-server backends). Reserve is a capacity hint; the
    # subsequent push/extend loop writes the exact same bytes regardless
    # of `n`. Mutating `len() * STRIDE` to `len() + STRIDE` (or
    # `... / ...`, or `prefix + memlen` to `prefix * memlen`) only
    # changes the number of internal Vec reallocations during fill — not
    # observable through any public output. Content equality is pinned by
    # the canonical layout tests in `snapshot.rs` and by every
    # snapshot/inspect test in the wasm and server crates.
    "snapshot\\.rs:.*replace \\* with [+/] in snapshot_into",
    "snapshot\\.rs:.*replace \\+ with \\* in inspect_into",
]
