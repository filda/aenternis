# cargo-mutants configuration for aenternis.
#
# Each entry in `exclude_re` is a regex matched against the mutant
# label, which has the form
#   `crates/<crate>/src/<file>:<line>:<col>: <transformation> in <function>`
# Exclusions document *equivalent* mutants — those whose mutated
# program produces output indistinguishable from the unmutated one
# under the constraints of the surrounding code, so no test could
# distinguish them. Exclusions document the *why*, not just suppress.
exclude_re = [
    # `r < frac` vs `r <= frac` in `stochastic_floor`. The two
    # comparisons differ only when `r == frac` exactly. Both `r` (from
    # `next_f64`) and `frac` (from `value - whole`) are arbitrary
    # 32-bit-derived f64 values; the probability of bit-exact equality
    # is below `2^-32` per draw, and any such tie shifts a *single*
    # rounded output by 1 — undetectable through the statistical
    # `stochastic_floor_expectation_matches_input` tolerance and
    # invisible to any deterministic snapshot.
    "rng\\.rs:.*replace < with <= in Rng::stochastic_floor",

    # Two `> → >=` mutants in `compute_natural_rates`, both equivalent
    # for different but converging reasons:
    #
    #   `if my_energy > neighbor_energy { stochastic_floor(...) } else { 0 }`
    # — with `>=`, the equality case enters the first branch and
    # computes `stochastic_floor(0.0 * coeff)`, which short-circuits
    # to `0` without advancing the RNG (`value <= 0.0` early-return).
    # Same rate=0 *and* same RNG state.
    #
    #   `if cell.total_rate() > my_energy { proportional_clamp(...) }`
    # — with `>=`, the equality case calls
    # `proportional_clamp(rates, my_energy, ...)`, which short-circuits
    # at `if total <= cap64 || total == 0 { return; }` without
    # modifying rates or drawing from RNG.
    #
    # Both are truly observation-equivalent.
    "tick\\.rs:.*replace > with >= in compute_natural_rates",
]
