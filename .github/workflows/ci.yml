name: CI

# Runs the verification gate (`./check` = TS typecheck + vitest with
# coverage + Rust fmt/clippy/test + WASM build, plus Stryker mutation
# as a separate job) on every push to main and on every pull request.
#
# Jobs that run in parallel for fast feedback:
#   - `typecheck` - tsc --noEmit (TypeScript type errors)
#   - `test`      - vitest with coverage thresholds (includes happy-dom
#                   smoke test in tests/web/)
#   - `mutation`  - Stryker mutation testing
#   - `rust`      - cargo fmt + clippy + test (workspace)
#
# After `typecheck`, `test` and `rust` pass on `main`, the `deploy` job builds the
# wasm-pack bundle fresh and publishes the static site (root rozcestník,
# prototypes, web/) to GitHub Pages. Mutation testing is intentionally
# NOT a deploy gate — it runs ~30 min and isn't load-bearing for the
# user-facing artifact.
#
# `test`, `mutation`, `rust` upload their HTML reports as artifacts
# (14-day retention).
#
# Prototypes under `prototypes/**` are deliberately excluded from the gate
# (see vitest.config.js and stryker.conf.json). Lab experiments are not
# expected to pass tests.
#
# Cross-OS matrix: not yet. The codebase is small and pure JS; the eventual
# WASM target is browser-only. Re-evaluate once the Rust workspace lands.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel previous runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # `web/worker.ts` imports from `crates/aenternis-wasm/pkg/aenternis_wasm.js`,
      # which is a wasm-pack output (not committed — generated artifact).
      # `tsc` resolves the import via the colocated `.d.ts`, so we have to
      # build the bundle before typecheck. Same step as the `deploy` job.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-typecheck-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-typecheck-
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM bundle
        run: wasm-pack build crates/aenternis-wasm --target web --release

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # `tests/web/wasm-bundle.smoke.test.ts` needs the wasm-pack
      # output to exist; without it the smoke `describe` block skips
      # and we lose CI coverage for the single-thread bundle path.
      # Single-threaded build is enough here (only ~10 s once cached)
      # — the smoke test doesn't call `initThreadPool` because
      # happy-dom can't host the rayon worker pool. Threaded-build
      # smoke runs in the `deploy` job's verifier step instead.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-test-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-test-
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM bundle (single-threaded, for smoke tests)
        run: wasm-pack build crates/aenternis-wasm --target web --release

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/coverage/
          retention-days: 14
          if-no-files-found: warn

  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
          if-no-files-found: warn

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rust-toolchain.toml at the repo root pins channel + components,
      # so this just honors that file.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  deploy:
    name: Deploy to GitHub Pages
    needs: [typecheck, test, rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Pages-specific concurrency: deploys serialize cleanly, never cancel an
    # in-flight upload. The repo-wide group above (`ci-${{ github.ref }}`)
    # handles cancelling stale CI runs; deploys live in their own lane.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Pinned nightly for the threaded WASM build. Must match
      # `scripts/_wasm-threaded-toolchain.sh`'s `WASM_THREADED_TOOLCHAIN`
      # — `./build` reads it via `RUSTUP_TOOLCHAIN` env to
      # override the workspace's stable pin for just that one invocation.
      # `rust-src` is required by `-Z build-std` (which rebuilds `std`
      # with the wasm32 atomics target-feature enabled).
      - name: Set up Rust nightly toolchain (threaded WASM)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          components: rust-src
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-deploy-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml', 'scripts/_wasm-threaded-toolchain.sh') }}
          restore-keys: |
            cargo-${{ runner.os }}-deploy-
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `./build` runs the two-pass WASM build (stable single-threaded
      # for CI parity, then threaded nightly which produces the
      # canonical `pkg/`) followed by tsc. The threaded bundle exports
      # `init_thread_pool` and uses a shared `WebAssembly.Memory`;
      # runtime requires the host page to be `crossOriginIsolated` —
      # handled by `web/coi-serviceworker.js` on GitHub Pages (which
      # can't set COOP/COEP headers natively). If the threaded build
      # ever needs to be disabled (e.g. nightly toolchain regression),
      # the script falls back to single-threaded with a warning, so a
      # CI failure points at the underlying issue rather than at
      # missing artifacts.
      #
      # tsc inside `./build` emits `dist/src/*.js` and `dist/web/*.js`
      # with `.ts` extensions on relative imports rewritten to `.js`
      # (`rewriteRelativeImportExtensions`). Bare imports like `three`
      # are left alone — they get resolved by the importmap inline in
      # `web/index.html`.
      - name: Build (WASM + TS)
        run: ./build

      # The site is a flat copy of the static parts of the repo:
      #   index.html (WASM viewer), prototypes/, docs/, the wasm-pack
      #   pkg/, and the tsc-emitted dist/web/ + dist/src/ trees mounted
      #   as web/ + src/. No bundling — bare imports resolve via the
      #   importmap inline in index.html.
      #
      # The sed call rewrites `href="/foo"` → `href="foo"` in the root
      # index so absolute paths in the navigation menu land under
      # Pages' `/<repo>/` subpath. Local dev (vite serving from `/`)
      # still works because browsers resolve the rewritten relatives
      # against the page URL.
      - name: Assemble site
        run: |
          mkdir -p _site/web _site/src
          cp index.html _site/
          cp -r prototypes _site/
          cp -r docs _site/
          cp dist/web/*.js _site/web/
          # coi-serviceworker.js lives at the repo root so its default
          # SW scope is `/aenternis/` on Pages (not `/aenternis/web/`),
          # which is required to intercept fetches from `crates/
          # aenternis-wasm/pkg/snippets/wasm-bindgen-rayon-*/`. Without
          # this scope breadth, the rayon worker bootstrap can't load
          # its helper scripts under a `crossOriginIsolated` page.
          cp coi-serviceworker.js _site/
          cp dist/src/*.js _site/src/
          mkdir -p _site/crates/aenternis-wasm
          cp -r crates/aenternis-wasm/pkg _site/crates/aenternis-wasm/pkg
          # `.nojekyll` tells GitHub Pages to skip Jekyll preprocessing
          # and serve the artifact verbatim. Jekyll's default include /
          # exclude rules silently drop some files under `pkg/snippets/
          # wasm-bindgen-rayon-*/src/` (`workerHelpers.js` returns 404),
          # which breaks `init_thread_pool` at runtime even though the
          # file is in the build output. We're a static deploy, no
          # Jekyll features used — disable it entirely.
          touch _site/.nojekyll
          sed -i 's|href="/|href="|g' _site/index.html

      # Tier-2 verification: assert that the assembled `_site/` has
      # every artifact the threaded WASM bundle needs at runtime. The
      # per-pkg verifier (`scripts/verify-threaded-wasm.sh`) already
      # ran inside the build step on `crates/aenternis-wasm/pkg/`;
      # this catches the *deploy*-specific regressions — the copy
      # commands above missing a file, GitHub Pages' Jekyll filter
      # silently dropping a path, the SW shim landing in the wrong
      # directory. Each check names the bug class it catches so a
      # failure tells the next dev exactly where to look.
      - name: Verify deploy site has every threaded-WASM artifact
        run: |
          fail() { echo "ERROR: $*" >&2; exit 1; }

          # `.nojekyll` at site root — without it GitHub Pages runs
          # Jekyll which silently drops files under `pkg/snippets/`.
          [ -f _site/.nojekyll ] \
            || fail ".nojekyll missing — Jekyll will eat pkg/snippets/*"

          # coi-serviceworker at site root — its SW scope is the
          # directory it's served from, and we need scope `/aenternis/`
          # to intercept fetches for `pkg/snippets/.../workerHelpers.js`.
          # If the file is only in `_site/web/`, scope is too narrow.
          [ -f _site/coi-serviceworker.js ] \
            || fail "coi-serviceworker.js not at site root — SW scope will be too narrow to cover crates/, threading will fail under crossOriginIsolated"

          # workerHelpers.js must have made it through cp -r and the
          # post-build patch must still be in place.
          helpers="$(find _site/crates/aenternis-wasm/pkg/snippets \
                          -name workerHelpers.js 2>/dev/null | head -1 || true)"
          [ -n "$helpers" ] \
            || fail "workerHelpers.js missing from _site/ — threading bootstrap will fail"
          grep -q "import('../../../aenternis_wasm.js')" "$helpers" \
            || fail "$helpers has unpatched import('../../..') — production deploy will 404 on pkg/"

          echo "OK: _site has every threaded-WASM artifact in the right place"

      # Stamp the deployed page with package version, short commit
      # SHA, and build date so a viewer can tell which release they're
      # looking at. Placeholders (`__BUILD_VERSION__`, `__BUILD_COMMIT__`,
      # `__BUILD_DATE__`) are baked into `index.html` at source; in
      # `npm run dev` they're visible verbatim, which is the intended
      # signal that you're not on a deployed build.
      - name: Inject build metadata
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          sed -i \
            -e "s|__BUILD_VERSION__|${VERSION}|g" \
            -e "s|__BUILD_COMMIT__|${COMMIT}|g" \
            -e "s|__BUILD_DATE__|${DATE}|g" \
            _site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
