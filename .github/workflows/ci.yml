name: CI

# Runs the verification gate (`npm run check` = vitest+coverage + Stryker)
# on every push to main and on every pull request.
#
# Jobs that run in parallel for fast feedback:
#   - `typecheck` - tsc --noEmit (TypeScript type errors)
#   - `test`      - vitest with coverage thresholds (includes happy-dom
#                   smoke test in tests/web/)
#   - `mutation`  - Stryker mutation testing
#   - `rust`      - cargo fmt + clippy + test (workspace)
#
# After `typecheck`, `test` and `rust` pass on `main`, the `deploy` job builds the
# wasm-pack bundle fresh and publishes the static site (root rozcestník,
# prototypes, web/) to GitHub Pages. Mutation testing is intentionally
# NOT a deploy gate — it runs ~30 min and isn't load-bearing for the
# user-facing artifact.
#
# `test`, `mutation`, `rust` upload their HTML reports as artifacts
# (14-day retention).
#
# Prototypes under `prototypes/**` are deliberately excluded from the gate
# (see vitest.config.js and stryker.conf.json). Lab experiments are not
# expected to pass tests.
#
# Cross-OS matrix: not yet. The codebase is small and pure JS; the eventual
# WASM target is browser-only. Re-evaluate once the Rust workspace lands.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel previous runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: reports/coverage/
          retention-days: 14
          if-no-files-found: warn

  mutation:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
          if-no-files-found: warn

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rust-toolchain.toml at the repo root pins channel + components,
      # so this just honors that file.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  deploy:
    name: Deploy to GitHub Pages
    needs: [typecheck, test, rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Pages-specific concurrency: deploys serialize cleanly, never cancel an
    # in-flight upload. The repo-wide group above (`ci-${{ github.ref }}`)
    # handles cancelling stale CI runs; deploys live in their own lane.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-deploy-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-deploy-
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM bundle
        run: wasm-pack build crates/aenternis-wasm --target web --release

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # tsc emits `dist/src/*.js` and `dist/web/*.js` with `.ts`
      # extensions on relative imports rewritten to `.js`
      # (`rewriteRelativeImportExtensions`). Bare imports like `three`
      # are left alone — they get resolved by the importmap inline in
      # `web/index.html`.
      - name: Build TypeScript
        run: npm run build

      # The site is a flat copy of the static parts of the repo:
      #   index.html, prototypes/, docs/, the wasm-pack pkg/, and the
      #   tsc-emitted dist/web/ + dist/src/ trees mounted as web/ + src/.
      #   No bundling — bare imports resolve via the importmap.
      #
      # The sed call rewrites `href="/foo"` → `href="foo"` in the root
      # rozcestník so the absolute paths land under Pages' `/<repo>/`
      # subpath. Local dev (vite serving from `/`) still works because
      # browsers resolve the rewritten relatives against the page URL.
      - name: Assemble site
        run: |
          mkdir -p _site/web _site/src
          cp index.html _site/
          cp -r prototypes _site/
          cp -r docs _site/
          cp web/index.html _site/web/index.html
          cp dist/web/*.js _site/web/
          cp dist/src/*.js _site/src/
          mkdir -p _site/crates/aenternis-wasm
          cp -r crates/aenternis-wasm/pkg _site/crates/aenternis-wasm/pkg
          sed -i 's|href="/|href="|g' _site/index.html

      # Stamp the deployed pages with package version, short commit
      # SHA, and build date so a viewer can tell which release they're
      # looking at. Placeholders (`__BUILD_VERSION__`, `__BUILD_COMMIT__`,
      # `__BUILD_DATE__`) are baked into `index.html` and `web/index.html`
      # at source; in `npm run dev` they're visible verbatim, which is
      # the intended signal that you're not on a deployed build.
      - name: Inject build metadata
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          for f in _site/index.html _site/web/index.html; do
            sed -i \
              -e "s|__BUILD_VERSION__|${VERSION}|g" \
              -e "s|__BUILD_COMMIT__|${COMMIT}|g" \
              -e "s|__BUILD_DATE__|${DATE}|g" \
              "$f"
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
