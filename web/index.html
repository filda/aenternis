<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Aenternis — WASM 3D viewer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050508;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #canvasContainer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }
    #canvasContainer canvas {
      display: block;
    }
    .hud {
      position: fixed;
      top: 16px; left: 16px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      font-size: 12px;
      z-index: 10;
    }
    .hud .panel {
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 10px 12px;
      pointer-events: auto;
      backdrop-filter: blur(6px);
    }
    .hud h2 {
      font-size: 14px;
      color: #d4a76a;
      margin-bottom: 6px;
    }
    .hud h3 {
      font-size: 12px;
      color: #d4a76a;
      margin-bottom: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 3px 0;
      flex-wrap: wrap;
    }
    .row .label, .row label {
      color: #8a8a90;
      min-width: 100px;
    }
    .row .value {
      color: #f0e0c0;
      font-variant-numeric: tabular-nums;
      margin-left: auto;
    }
    .panel.hint {
      color: #8a8a90;
      font-style: italic;
      font-size: 11px;
      line-height: 1.4;
    }
    .panel.hint strong {
      color: #d4a76a;
      font-style: normal;
    }
    input[type="number"], select {
      background: #0e0e12;
      color: #e0e0e0;
      border: 1px solid #2a2a30;
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 11px;
      width: 110px;
    }
    input[type="range"] {
      flex: 1;
      max-width: 130px;
    }
    button {
      background: #2a2a35;
      color: #e0e0e0;
      border: 1px solid #3a3a45;
      padding: 4px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      margin-right: 4px;
    }
    button:hover { background: #34344a; }
  </style>
</head>
<body>
  <div id="canvasContainer"></div>

  <div class="hud">
    <div class="panel">
      <h2>Aenternis · WASM 3D</h2>
      <div class="row"><span class="label">tick</span><span class="value" id="tick">0</span></div>
      <div class="row"><span class="label">cells</span><span class="value" id="cells">0</span></div>
      <div class="row"><span class="label">total energy</span><span class="value" id="energy">0</span></div>
      <div class="row"><span class="label">FPS</span><span class="value" id="fps">-</span></div>
    </div>

    <div class="panel">
      <h3>Controls</h3>
      <div class="row">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="panel">
      <h3>Config</h3>
      <div class="row">
        <label>seed</label>
        <input id="seed" type="number" value="42" min="0" max="4294967295">
      </div>
      <div class="row">
        <label>energy</label>
        <input id="energy_in" type="number" value="500" min="0" max="100000">
      </div>
      <div class="row">
        <label>coeff</label>
        <input id="coeff" type="range" min="0.05" max="0.30" step="0.01" value="0.20">
        <span class="value" id="coeffVal">0.20</span>
      </div>
      <div class="row">
        <label>k</label>
        <input id="k" type="range" min="1" max="32" value="1">
        <span class="value" id="kVal">1</span>
      </div>
    </div>

    <div class="panel">
      <h3>Tracker</h3>
      <div class="row">
        <label>sledovat</label>
        <input id="trackerEnabled" type="checkbox" checked>
        <span class="hint">nejsilnější cela</span>
      </div>
      <div class="row">
        <label>trail</label>
        <input id="trailLen" type="range" min="0" max="200" step="5" value="60">
        <span class="value" id="trailLenVal">60</span>
      </div>
      <div class="row">
        <label>pozice</label>
        <span class="value" id="trackerPos">-</span>
      </div>
    </div>

    <div class="panel hint">
      <strong>Kamera:</strong> drag = rotace, scroll = zoom, pravé tl. = pan.<br>
      <strong>WSAD</strong> + Q/E (dolů/nahoru), Shift = sprint (3×).<br>
      Phase 4b — WSAD kamera + tracker s trail.
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
